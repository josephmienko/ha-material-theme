name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Rebuild generated theme
        run: python scripts/build_theme.py

      - name: Verify generated file is committed
        run: git diff --exit-code -- themes/ha-material-theme.yaml

      - name: Run tests
        run: pytest -q
